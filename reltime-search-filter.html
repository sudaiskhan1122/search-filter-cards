<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search Filter UI</title>
<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, Helvetica, sans-serif;
}

body{
  background:#000;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  flex-direction:column;
  padding: 40px 0;
  color: #fff;
}

/* Search Box */
.search-box{
  margin-bottom:40px;
  text-align:center;
}

.search-box input{
  width:260px;
  padding:12px 15px;
  border:none;
  outline:none;
  border-radius:6px;
  background:#111;
  color:white;
  font-size:16px;
}

/* Card Container */
.card-container{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
  justify-content:center;
}

/* Card */
.card{
  width:200px;
  height:320px;
  border-radius:20px;
  overflow:hidden;
  position:relative;
  box-shadow:0 5px 15px rgba(255,255,255,0.1);
  transition: transform 0.2s;
}

.card:hover{
  transform: scale(1.05);
}

/* Image */
.card img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* Overlay */
.card .overlay{
  position:absolute;
  bottom:0;
  left:0;
  width:100%;
  padding:15px;
  color:white;
  background:linear-gradient(to top, rgba(0,0,0,0.7), transparent);
}

/* Name */
.card h3{
  margin-bottom:6px;
  font-size:16px;
}

/* Description */
.card p{
  font-size:13px;
  opacity:0.9;
}
</style>
</head>
<body>

<!-- Search -->
<div class="search-box">
  <input type="text" placeholder="Search..." id="search">
</div>

<!-- Cards -->
<div class="card-container"></div>

<!-- JS -->
<script src="reltime-search-filter.js"></script>
</body>
</html>
